apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: framm-web
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kod-digor/framm
    targetRevision: main
    path: k8s/apps/web
  destination:
    server: https://kubernetes.default.svc
    namespace: framm
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true

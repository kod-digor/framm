# Migrations Prisma + seed exécutés avant chaque sync ArgoCD (hook PreSync)
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: rg.fr-par.scw.cloud/framm-kod-digor/worker
          command: ["sh", "-c", "npx prisma migrate deploy && npm run db:seed"]
          envFrom:
            - secretRef:
                name: framm-env

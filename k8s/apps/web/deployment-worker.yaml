apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  labels:
    app: framm-worker
spec:
  # 4 replicas : jusqu'à 4 migrations mail en parallèle (1 par pod, MIGRATION_WORKER_CONCURRENCY=1).
  # Le débit reste limité par Gmail IMAP (~2–5 msg/s par compte) — voir env.example.
  replicas: 4
  selector:
    matchLabels:
      app: framm-worker
  template:
    metadata:
      labels:
        app: framm-worker
    spec:
      containers:
        - name: worker
          image: rg.fr-par.scw.cloud/framm-kod-digor/worker
          envFrom:
            - secretRef:
                name: framm-env
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi

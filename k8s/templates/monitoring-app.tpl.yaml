# Rendu par k8s-bootstrap.sh : contient l'adresse d'alerte et la config SMTP
# (le mot de passe SMTP reste dans le secret framm-alert-smtp, jamais ici).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 86.2.2
    helm:
      valuesObject:
        grafana:
          admin:
            existingSecret: framm-grafana
            userKey: admin-user
            passwordKey: admin-password
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt
            hosts:
              - grafana.__PRIMARY_DOMAIN__
            tls:
              - secretName: grafana-tls
                hosts:
                  - grafana.__PRIMARY_DOMAIN__
        prometheus:
          prometheusSpec:
            retention: 7d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 5Gi
        alertmanager:
          alertmanagerSpec:
            secrets:
              - framm-alert-smtp
          config:
            global:
              smtp_smarthost: "__ALERT_SMTP_HOST__:__ALERT_SMTP_PORT__"
              smtp_from: "__ALERT_SMTP_FROM__"
              smtp_auth_username: "__ALERT_SMTP_USER__"
              smtp_auth_password_file: /etc/alertmanager/secrets/framm-alert-smtp/password
              smtp_require_tls: true
            route:
              receiver: bureau
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 4h
              routes:
                - receiver: "null"
                  matchers:
                    - alertname = "Watchdog"
            receivers:
              - name: "null"
              - name: bureau
                email_configs:
                  - to: "__ALERT_EMAIL__"
                    send_resolved: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

services:
  stalwart:
    # Version épinglée — mises à jour automatisées par Renovate (renovate.json) :
    # patchs auto-mergés et déployés par la CI, mineures/majeures via PR à valider.
    image: stalwartlabs/stalwart:v0.16.8
    restart: unless-stopped
    env_file:
      - ../.generated/env.production
    ports:
      - "25:25"
      - "465:465"
      - "587:587"
      - "993:993"
    environment:
      - STALWART_RECOVERY_ADMIN=admin:${STALWART_API_KEY}
      - STALWART_PUBLIC_URL=${WEBMAIL_URL}
    volumes:
      # Persistance obligatoire : sans ce montage, mails + config vivent dans
      # la couche éphémère du conteneur et sont perdus à chaque recréation.
      - /opt/framm/mail-data:/var/lib/stalwart

  # docker-proxy → Stalwart renvoie une réponse vide depuis l'hôte (nginx, tunnel SSH).
  # socat sur le réseau compose relaie correctement vers stalwart:8080.
  stalwart-proxy:
    image: alpine/socat@sha256:2b6b49e9000105672bf70648f8642801791374a24f549d30bed3c3115c13d24c
    restart: unless-stopped
    depends_on:
      - stalwart
    ports:
      - "127.0.0.1:8080:8080"
    command: ["TCP-LISTEN:8080,fork,reuseaddr", "TCP:stalwart:8080"]

  node-exporter:
    image: prom/node-exporter:v1.8.0
    restart: unless-stopped
    network_mode: host
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /var/lib/node_exporter/textfile_collector:/textfile:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.textfile.directory=/textfile

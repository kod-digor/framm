services:
  stalwart:
    # Version épinglée — mises à jour automatisées par Renovate (renovate.json) :
    # patchs auto-mergés et déployés par la CI, mineures/majeures via PR à valider.
    image: stalwartlabs/stalwart:v0.16.8
    restart: unless-stopped
    env_file:
      - ../.generated/env.production
    ports:
      - "25:25"
      - "465:465"
      - "587:587"
      - "993:993"
      - "127.0.0.1:8080:18080"
    environment:
      - STALWART_RECOVERY_ADMIN=admin:${STALWART_API_KEY}
      - STALWART_PUBLIC_URL=${WEBMAIL_URL}
      # Phase 1 : variables S3 injectées mais BlobStore non activé dans config.toml.
      # Phase 2 (maintenance) : configurer store.blob → S3, migrer blobs locaux, valider.
      - STALWART_S3_ENDPOINT=${S3_ENDPOINT}
      - STALWART_S3_REGION=${S3_REGION}
      - STALWART_S3_BUCKET=${S3_BUCKET_MAIL_BLOBS}
      - STALWART_S3_ACCESS_KEY=${S3_MAIL_BLOBS_ACCESS_KEY}
      - STALWART_S3_SECRET_KEY=${S3_MAIL_BLOBS_SECRET_KEY}
    volumes:
      # Persistance obligatoire : sans ce montage, mails + config vivent dans
      # la couche éphémère du conteneur et sont perdus à chaque recréation.
      - /opt/framm/mail-data:/var/lib/stalwart
      # Certificats LE (IMAPS 993, SMTP 587/465) — copiés depuis certbot par deploy mail.
      - /opt/framm/stalwart-tls:/etc/stalwart/tls:ro

  # Migration IMAP : imapsync s'exécute dans le pod worker K8s (Dockerfile.worker).
  # imapsync est aussi installé sur la VM mail (cloud-init / host-setup) pour
  # deploy/scripts/lib/migration-run.sh (vérification manuelle).

  # docker-proxy → connexion directe à Stalwart:8080 renvoie une réponse vide
  # depuis l'hôte. Socat partage le namespace réseau de stalwart, écoute sur
  # 18080 et relaie vers 127.0.0.1:8080 (port publié 8080→18080 sur stalwart).
  # Après un restart/recreate de stalwart seul, recréer stalwart-proxy (framm_stalwart_ensure_jmap_proxy).
  stalwart-proxy:
    image: alpine/socat@sha256:2b6b49e9000105672bf70648f8642801791374a24f549d30bed3c3115c13d24c
    restart: unless-stopped
    network_mode: "service:stalwart"
    depends_on:
      - stalwart
    command: ["TCP-LISTEN:18080,fork,reuseaddr", "TCP:127.0.0.1:8080"]

  bulwark:
    # Version épinglée — mises à jour automatisées par Renovate (renovate.json).
    image: ghcr.io/bulwarkmail/webmail:1.7.3
    restart: unless-stopped
    env_file:
      - ../.generated/env.production
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      # Même origine que Bulwark (nginx proxy /jmap → Stalwart). Évite CORS navigateur.
      - JMAP_SERVER_URL=${WEBMAIL_URL}
      - STALWART_FEATURES=true
      - SESSION_SECRET=${BULWARK_SESSION_SECRET}
      - APP_NAME=Framm Webmail
      - BULWARK_TELEMETRY=off
      - TRUSTED_PROXY_DEPTH=1
    volumes:
      - /opt/framm/bulwark-data/admin:/app/data/admin
      - /opt/framm/bulwark-data/admin-state:/app/data/admin-state
      - /opt/framm/bulwark-data/settings:/app/data/settings
      - /opt/framm/bulwark-data/telemetry:/app/data/telemetry
    depends_on:
      - stalwart

  node-exporter:
    image: prom/node-exporter:v1.8.0
    restart: unless-stopped
    network_mode: host
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /var/lib/node_exporter/textfile_collector:/textfile:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.textfile.directory=/textfile

groups:
  - name: framm
    rules:
      - alert: FrammNodeDown
        expr: up{job="node"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "VM injoignable ({{ $labels.role }} — {{ $labels.instance }})"

      - alert: FrammWebDown
        expr: up{job="framm-app"} == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Application web indisponible"

      # absent() couvre le cas où le backup n'a JAMAIS tourné (métrique inexistante),
      # la comparaison temporelle couvre un cron silencieusement arrêté.
      - alert: FrammBackupPostgresStale
        expr: absent(framm_backup_postgres_last_success_seconds) or (time() - framm_backup_postgres_last_success_seconds > 100800)
        for: 1h
        labels:
          severity: critical
        annotations:
          summary: "Aucun backup PostgreSQL réussi depuis plus de 28h"

      - alert: FrammBackupPostgresFailed
        expr: framm_backup_postgres_success != 1
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "Dernier backup PostgreSQL en échec"

      - alert: FrammBackupStalwartStale
        expr: absent(framm_backup_stalwart_last_success_seconds) or (time() - framm_backup_stalwart_last_success_seconds > 100800)
        for: 1h
        labels:
          severity: critical
        annotations:
          summary: "Aucun backup Stalwart (mails) réussi depuis plus de 28h"

      - alert: FrammBackupStalwartFailed
        expr: framm_backup_stalwart_success != 1
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "Dernier backup Stalwart en échec"

      - alert: FrammDiskSpaceWarning
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|squashfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|squashfs|overlay"}) < 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Espace disque faible ({{ $labels.instance }} {{ $labels.mountpoint }})"

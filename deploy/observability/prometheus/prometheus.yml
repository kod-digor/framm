global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node
    static_configs:
      - targets: ['localhost:9100']
        labels:
          role: app
      # Port 9100 ouvert uniquement à l'IP de la VM App (security group Terraform)
      - targets: ['mail.kod-digor.bzh:9100']
        labels:
          role: mail

  - job_name: framm-app
    metrics_path: /api/health
    static_configs:
      - targets: ['web:3000']

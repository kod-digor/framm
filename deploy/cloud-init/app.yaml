#cloud-config
package_update: true
package_upgrade: false

packages:
  - docker.io
  - docker-compose-v2
  - nginx
  - certbot
  - python3-certbot-nginx
  - unattended-upgrades
  - fail2ban
  - rsync
  - curl
  - unzip

ssh_authorized_keys:
  - ${ssh_public_key}

write_files:
  - path: /etc/framm/domain
    content: ${domain}
    permissions: '0644'

runcmd:
  - |
    if ! command -v aws >/dev/null 2>&1; then
      tmp=$(mktemp -d)
      curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "$tmp/awscliv2.zip"
      unzip -q "$tmp/awscliv2.zip" -d "$tmp"
      "$tmp/aws/install" -i /usr/local/aws-cli -b /usr/local/bin --update
      rm -rf "$tmp"
    fi
  - systemctl enable docker && systemctl start docker
  - usermod -aG docker root
  - mkdir -p /opt/framm /opt/framm/data/postgres /var/www/acme /var/lib/node_exporter/textfile_collector
  - |
    for id in /dev/disk/by-id/scsi-0SCW_sbs_volume-*; do
      [ -e "$id" ] || continue
      dev=$(readlink -f "$id")
      echo "$dev" | grep -q sda && continue
      lsblk -n -o MOUNTPOINT "$dev" 2>/dev/null | grep -q . && continue
      if ! blkid -o value -s TYPE "$dev" 2>/dev/null | grep -q .; then
        mkfs.ext4 -F -L framm-docker "$dev"
      fi
      systemctl stop docker || true
      mkdir -p /var/lib/docker
      mount "$dev" /var/lib/docker
      uuid=$(blkid -s UUID -o value "$dev")
      grep -q "$uuid" /etc/fstab 2>/dev/null || echo "UUID=$uuid /var/lib/docker ext4 defaults,nofail 0 2" >> /etc/fstab
      systemctl start docker
      break
    done
  - echo "Cloud-init Framm app complete" > /opt/framm/ready.txt

# GitOps Framm — push sur main/master → déploiement prod automatique
name: Deploy

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  NODE_VERSION: "22"
  PRIMARY_PLATFORM_DOMAIN: kod-digor.bzh
  AUTH_URL: https://kod-digor.bzh
  WEBMAIL_URL: https://webmail.kod-digor.bzh
  REGISTRY: rg.fr-par.scw.cloud/framm-kod-digor

jobs:
  detect-changes:
    name: Detect changed paths
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      mail: ${{ steps.filter.outputs.mail }}
      terraform: ${{ steps.filter.outputs.terraform }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            mail:
              - 'deploy/**'
              - 'terraform/**'
            terraform:
              - 'terraform/**'

  test-web:
    name: Test web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build -- --webpack

  terraform-validate:
    name: Terraform validate
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && needs.detect-changes.outputs.terraform == 'true')
    needs: [detect-changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      - run: terraform init -backend=false && terraform validate
        working-directory: terraform/environments/prod

  infra-health-checks:
    name: Infra health checks
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      needs.detect-changes.outputs.mail == 'true'
    needs: [test-web, terraform-sync, detect-changes]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://kod-digor.bzh
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run Stalwart / TEM smoke tests
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          MAIL_PUBLIC_IP: ${{ secrets.MAIL_PUBLIC_IP }}
          STALWART_URL: https://mail.${{ env.PRIMARY_PLATFORM_DOMAIN }}
          WEBMAIL_URL: ${{ env.WEBMAIL_URL }}
          PLATFORM_DOMAINS: ${{ env.PRIMARY_PLATFORM_DOMAIN }}
          PRIMARY_PLATFORM_DOMAIN: ${{ env.PRIMARY_PLATFORM_DOMAIN }}
        run: ./deploy/scripts/ci-infra-health-checks.sh

  terraform-sync:
    name: Terraform sync (TEM relay)
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      needs.detect-changes.outputs.mail == 'true'
    needs: [test-web, detect-changes]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://kod-digor.bzh
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      - name: Apply Terraform and propagate OUTBOUND_SMTP_RELAY
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          BUREAU_ADMIN_EMAIL: ${{ secrets.BUREAU_ADMIN_EMAIL }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          MAIL_PUBLIC_IP: ${{ secrets.MAIL_PUBLIC_IP }}
          GOOGLE_MIGRATION_CLIENT_ID: ${{ secrets.GOOGLE_MIGRATION_CLIENT_ID }}
          GOOGLE_MIGRATION_CLIENT_SECRET: ${{ secrets.GOOGLE_MIGRATION_CLIENT_SECRET }}
          MICROSOFT_MIGRATION_CLIENT_ID: ${{ secrets.MICROSOFT_MIGRATION_CLIENT_ID }}
          MICROSOFT_MIGRATION_CLIENT_SECRET: ${{ secrets.MICROSOFT_MIGRATION_CLIENT_SECRET }}
          DNS_ENABLED: "true"
          TEM_ENABLED: "true"
        run: ./deploy/scripts/ci-terraform-sync.sh

  deploy-prod:
    name: Deploy mail VM
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      needs.detect-changes.outputs.mail == 'true'
    needs: [test-web, terraform-sync, infra-health-checks, detect-changes]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://kod-digor.bzh
    steps:
      - uses: actions/checkout@v4

      - name: Deploy mail stack only
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          MAIL_PUBLIC_IP: ${{ secrets.MAIL_PUBLIC_IP }}
          BULWARK_SESSION_SECRET: ${{ secrets.BULWARK_SESSION_SECRET }}
        run: ./deploy/scripts/ci-deploy-mail.sh

  build-push-web:
    name: Build & push web image
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      always() &&
      needs.test-web.result == 'success' &&
      (needs.terraform-sync.result == 'success' || needs.terraform-sync.result == 'skipped') &&
      (needs.infra-health-checks.result == 'success' || needs.infra-health-checks.result == 'skipped')
    needs: [test-web, terraform-sync, infra-health-checks, detect-changes]
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.creds.outputs.enabled }}
    steps:
      - uses: actions/checkout@v4

      - name: Check registry credentials
        id: creds
        run: |
          if [ -n "${{ secrets.SCW_SECRET_KEY }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Secret SCW_SECRET_KEY absent — build Kapsule sauté"
          fi

      - name: Set up Docker Buildx
        if: steps.creds.outputs.enabled == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Scaleway registry
        if: steps.creds.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: rg.fr-par.scw.cloud
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build & push web
        if: steps.creds.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/web:${{ github.sha }}
            ${{ env.REGISTRY }}/web:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/web:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/web:buildcache,mode=max

  build-push-worker:
    name: Build & push worker image
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      always() &&
      needs.test-web.result == 'success' &&
      (needs.terraform-sync.result == 'success' || needs.terraform-sync.result == 'skipped') &&
      (needs.infra-health-checks.result == 'success' || needs.infra-health-checks.result == 'skipped')
    needs: [test-web, terraform-sync, infra-health-checks, detect-changes]
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.creds.outputs.enabled }}
    steps:
      - uses: actions/checkout@v4

      - name: Check registry credentials
        id: creds
        run: |
          if [ -n "${{ secrets.SCW_SECRET_KEY }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Secret SCW_SECRET_KEY absent — build Kapsule sauté"
          fi

      - name: Set up Docker Buildx
        if: steps.creds.outputs.enabled == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Scaleway registry
        if: steps.creds.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: rg.fr-par.scw.cloud
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build & push worker
        if: steps.creds.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          file: apps/web/Dockerfile.worker
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/worker:${{ github.sha }}
            ${{ env.REGISTRY }}/worker:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/worker:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/worker:buildcache,mode=max

  gitops-update:
    name: Update image tags (GitOps)
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      needs.build-push-web.outputs.enabled == 'true' &&
      needs.build-push-worker.outputs.enabled == 'true'
    needs: [build-push-web, build-push-worker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update image tags (GitOps)
        run: |
          sed -i "s/newTag: .*/newTag: ${{ github.sha }}/" k8s/apps/web/kustomization.yaml
          git config user.name "framm-ci"
          git config user.email "ci@kod-digor.bzh"
          git add k8s/apps/web/kustomization.yaml
          git diff --cached --quiet || {
            git commit -m "chore: deploy ${GITHUB_SHA::8} [skip ci]"
            git push
          }

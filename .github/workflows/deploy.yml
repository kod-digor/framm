# GitOps Framm — push sur main/master → déploiement prod automatique
name: Deploy

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  NODE_VERSION: "22"
  PRIMARY_PLATFORM_DOMAIN: kod-digor.bzh
  AUTH_URL: https://kod-digor.bzh
  WEBMAIL_URL: https://webmail.kod-digor.bzh

jobs:
  test-web:
    name: Test web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build -- --webpack

  terraform-validate:
    name: Terraform validate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      - run: terraform init -backend=false && terraform validate
        working-directory: terraform/environments/prod

  deploy-prod:
    name: Deploy mail VM
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: test-web
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://kod-digor.bzh
    steps:
      - uses: actions/checkout@v4

      - name: Deploy mail stack only
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          MAIL_PUBLIC_IP: ${{ secrets.MAIL_PUBLIC_IP }}
        run: ./deploy/scripts/ci-deploy-mail.sh

  # GitOps Kubernetes : construit les images, les pousse au registre Scaleway
  # puis met à jour le tag dans k8s/apps/web — ArgoCD déploie le reste.
  # Nécessite le secret SCW_SECRET_KEY ; le job se saute proprement sinon.
  build-push:
    name: Build & push images (Kapsule)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: test-web
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      REGISTRY: rg.fr-par.scw.cloud/framm-kod-digor
    steps:
      - uses: actions/checkout@v4

      - name: Check registry credentials
        id: creds
        run: |
          if [ -n "${{ secrets.SCW_SECRET_KEY }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Secret SCW_SECRET_KEY absent — build Kapsule sauté"
          fi

      - name: Login to Scaleway registry
        if: steps.creds.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: rg.fr-par.scw.cloud
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build & push web
        if: steps.creds.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/web:${{ github.sha }}

      - name: Build & push worker
        if: steps.creds.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          file: apps/web/Dockerfile.worker
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/worker:${{ github.sha }}

      - name: Update image tags (GitOps)
        if: steps.creds.outputs.enabled == 'true'
        run: |
          sed -i "s/newTag: .*/newTag: ${{ github.sha }}/" k8s/apps/web/kustomization.yaml
          git config user.name "framm-ci"
          git config user.email "ci@kod-digor.bzh"
          git add k8s/apps/web/kustomization.yaml
          git diff --cached --quiet || {
            git commit -m "chore: deploy ${GITHUB_SHA::8} [skip ci]"
            git push
          }
